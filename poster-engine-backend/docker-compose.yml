services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: poster_engine
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: .
    command: uvicorn apps.api.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - storage:/data/storage
    depends_on:
      - postgres
      - redis

  worker:
    build: .
    command: celery -A apps.worker.celery_app worker -l INFO
    env_file: .env
    volumes:
      - .:/app
      - storage:/data/storage
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
  storage:
