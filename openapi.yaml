openapi: 3.1.0
info:
  title: Multi-Character Drama Engine API
  version: 1.1.0
  description: |
    Runtime-aligned OpenAPI for the current drama stack implementation.

servers:
  - url: /api/v1

tags:
  - name: drama-characters
  - name: drama-relationships
  - name: drama-scenes
  - name: drama-arcs
  - name: drama-compile
  - name: drama-memory
  - name: drama-state
  - name: drama-admin

paths:
  /drama/characters:
    get:
      tags: [drama-characters]
      summary: List characters
      parameters:
        - in: query
          name: project_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Character list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CharacterRead"
    post:
      tags: [drama-characters]
      summary: Create character
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CharacterCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterRead"

  /drama/characters/{character_id}:
    get:
      tags: [drama-characters]
      summary: Get character with latest state
      parameters:
        - $ref: "#/components/parameters/CharacterId"
      responses:
        "200":
          description: Character details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterWithStateRead"
    patch:
      tags: [drama-characters]
      summary: Update character
      parameters:
        - $ref: "#/components/parameters/CharacterId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CharacterUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterRead"

  /drama/characters/{character_id}/preset/apply:
    post:
      tags: [drama-characters]
      summary: Apply archetype preset
      parameters:
        - $ref: "#/components/parameters/CharacterId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [archetype]
              properties:
                archetype:
                  type: string
      responses:
        "200":
          description: Updated with preset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterRead"

  /drama/characters/{character_id}/state/latest:
    get:
      tags: [drama-characters]
      summary: Get latest character state
      parameters:
        - $ref: "#/components/parameters/CharacterId"
      responses:
        "200":
          description: Latest state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterStateRead"

  /drama/relationships:
    get:
      tags: [drama-relationships]
      summary: List relationships by project or character
      parameters:
        - in: query
          name: project_id
          required: false
          schema:
            type: string
            format: uuid
        - in: query
          name: character_id
          required: false
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Relationship list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RelationshipRead"
    post:
      tags: [drama-relationships]
      summary: Create relationship
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RelationshipCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RelationshipRead"

  /drama/relationships/{relationship_id}:
    patch:
      tags: [drama-relationships]
      summary: Update relationship
      parameters:
        - in: path
          name: relationship_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RelationshipUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RelationshipRead"

  /drama/relationships/graph:
    get:
      tags: [drama-relationships]
      summary: Get relationship graph
      parameters:
        - in: query
          name: project_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Graph payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RelationshipGraph"

  /drama/relationships/graph/rebuild:
    post:
      tags: [drama-relationships]
      summary: Rebuild relationship graph (current impl returns immediate stub status)
      parameters:
        - in: query
          name: project_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Rebuild response
          content:
            application/json:
              schema:
                type: object

  /drama/scenes/analyze:
    post:
      tags: [drama-scenes]
      summary: Analyze scene
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SceneDramaAnalyzeRequest"
      responses:
        "200":
          description: Analysis response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SceneDramaAnalyzeResponse"

  /drama/scenes/{scene_id}/analyze:
    post:
      tags: [drama-scenes]
      summary: Analyze scene by path scene_id
      parameters:
        - $ref: "#/components/parameters/SceneId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeSceneRequest"
      responses:
        "200":
          description: Analysis response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SceneDramaAnalyzeResponse"

  /drama/scenes/{scene_id}/compile:
    post:
      tags: [drama-scenes]
      summary: Compile and persist scene drama outputs
      parameters:
        - $ref: "#/components/parameters/SceneId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompileSceneRequest"
      responses:
        "200":
          description: Compiled payload
          content:
            application/json:
              schema:
                type: object

  /drama/scenes/{scene_id}/state:
    get:
      tags: [drama-scenes]
      summary: Get persisted scene state row
      parameters:
        - $ref: "#/components/parameters/SceneId"
      responses:
        "200":
          description: Scene state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SceneDramaStateRead"

  /drama/scenes/{scene_id}/subtext:
    get:
      tags: [drama-scenes]
      summary: Get persisted dialogue subtext rows
      parameters:
        - $ref: "#/components/parameters/SceneId"
      responses:
        "200":
          description: Subtext rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DialogueSubtextRead"

  /drama/scenes/{scene_id}/blocking:
    get:
      tags: [drama-scenes]
      summary: Get persisted blocking plan
      parameters:
        - $ref: "#/components/parameters/SceneId"
      responses:
        "200":
          description: Blocking plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlockingPlanRead"

  /drama/scenes/{scene_id}/camera-plan:
    get:
      tags: [drama-scenes]
      summary: Get persisted camera plan
      parameters:
        - $ref: "#/components/parameters/SceneId"
      responses:
        "200":
          description: Camera plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CameraPlanRead"

  /drama/scenes/{scene_id}/apply-outcome:
    post:
      tags: [drama-scenes]
      summary: Apply outcome and mark continuity payload
      parameters:
        - $ref: "#/components/parameters/SceneId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplySceneOutcomeRequest"
      responses:
        "202":
          description: Accepted
          content:
            application/json:
              schema:
                type: object

  /drama/scenes/{scene_id}/power-shifts:
    get:
      tags: [drama-scenes]
      summary: Get persisted power shift rows
      parameters:
        - $ref: "#/components/parameters/SceneId"
      responses:
        "200":
          description: Power shifts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PowerShiftRead"

  /drama/arcs/advance:
    post:
      tags: [drama-arcs]
      summary: Advance arc (engine-level)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdvanceArcRequest"
      responses:
        "200":
          description: Arc engine output
          content:
            application/json:
              schema:
                type: object

  /drama/arcs/{character_id}:
    get:
      tags: [drama-arcs]
      summary: List persisted arc progress for character
      parameters:
        - $ref: "#/components/parameters/CharacterId"
      responses:
        "200":
          description: Arc list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ArcProgressRead"

  /drama/arcs/{character_id}/advance:
    post:
      tags: [drama-arcs]
      summary: Advance arc for scoped character (current runtime delegates to engine payload)
      parameters:
        - $ref: "#/components/parameters/CharacterId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdvanceArcRequest"
      responses:
        "200":
          description: Arc updated
          content:
            application/json:
              schema:
                type: object

  /drama/arcs/recompute:
    post:
      tags: [drama-arcs]
      summary: Recompute arc rows by episode or whole project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecomputeArcRequest"
      responses:
        "200":
          description: Recompute result
          content:
            application/json:
              schema:
                type: object

  /drama/compile/scene:
    post:
      tags: [drama-compile]
      summary: Compile scene package from analysis payload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompileSceneDirectRequest"
      responses:
        "200":
          description: Compiled scene payload
          content:
            application/json:
              schema:
                type: object

  /drama/compile/episode:
    post:
      tags: [drama-compile]
      summary: Compile episode package from persisted scene rows
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompileEpisodeRequest"
      responses:
        "200":
          description: Episode compile response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompileEpisodeResponse"

  /drama/compile/project:
    post:
      tags: [drama-compile]
      summary: Compile project package from persisted scene rows
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompileProjectRequest"
      responses:
        "200":
          description: Project compile response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompileProjectResponse"

  /drama/memory/characters/{character_id}:
    get:
      tags: [drama-memory]
      summary: List memories for a character
      parameters:
        - $ref: "#/components/parameters/CharacterId"
      responses:
        "200":
          description: Memory rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DramaMemoryTraceRead"

  /drama/memory/characters/{character_id}/recall:
    get:
      tags: [drama-memory]
      summary: Recall memories with trigger
      parameters:
        - $ref: "#/components/parameters/CharacterId"
        - in: query
          name: trigger
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Recalled memories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DramaMemoryTraceRead"

  /drama/memory/{memory_id}:
    get:
      tags: [drama-memory]
      summary: Get memory by id
      parameters:
        - in: path
          name: memory_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Memory row
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DramaMemoryTraceRead"

  /drama/state/scenes/{scene_id}:
    get:
      tags: [drama-state]
      summary: Read scene state from state API
      parameters:
        - $ref: "#/components/parameters/SceneId"
      responses:
        "200":
          description: Scene state row
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SceneDramaStateRead"

  /drama/state/episodes/{episode_id}/latest:
    get:
      tags: [drama-state]
      summary: Get latest scene state for episode
      parameters:
        - in: path
          name: episode_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Latest episode state
          content:
            application/json:
              schema:
                type: object

  /drama/state/projects/{project_id}/dashboard:
    get:
      tags: [drama-state]
      summary: Project drama dashboard summary
      parameters:
        - in: path
          name: project_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Dashboard payload
          content:
            application/json:
              schema:
                type: object

  /drama/admin/episodes/{episode_id}/recompute:
    post:
      tags: [drama-admin]
      summary: Recompute continuity drift from a scene forward
      parameters:
        - in: path
          name: episode_id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: starting_scene_id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: scene_ids
          required: true
          schema:
            type: array
            items:
              type: string
              format: uuid
      responses:
        "200":
          description: Recompute result
          content:
            application/json:
              schema:
                type: object

components:
  parameters:
    CharacterId:
      in: path
      name: character_id
      required: true
      schema:
        type: string
        format: uuid
    SceneId:
      in: path
      name: scene_id
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    CharacterCreate:
      type: object
      required: [project_id, name, archetype]
      properties:
        project_id: {type: string}
        name: {type: string}
        archetype: {type: string}
        public_persona: {type: string, nullable: true}
        private_self: {type: string, nullable: true}
        outer_goal: {type: string, nullable: true}
        hidden_need: {type: string, nullable: true}
        core_wound: {type: string, nullable: true}
        dominant_fear: {type: string, nullable: true}
        mask_strategy: {type: string, nullable: true}

    CharacterUpdate:
      type: object
      additionalProperties: false
      properties:
        name: {type: string}
        archetype: {type: string}
        public_persona: {type: string, nullable: true}
        private_self: {type: string, nullable: true}
        outer_goal: {type: string, nullable: true}
        hidden_need: {type: string, nullable: true}
        core_wound: {type: string, nullable: true}
        dominant_fear: {type: string, nullable: true}
        mask_strategy: {type: string, nullable: true}
        pressure_response: {type: string, nullable: true}

    CharacterRead:
      type: object
      required: [id, project_id, name, archetype]
      properties:
        id: {type: string, format: uuid}
        project_id: {type: string}
        name: {type: string}
        archetype: {type: string}
        public_persona: {type: string, nullable: true}
        private_self: {type: string, nullable: true}
        outer_goal: {type: string, nullable: true}
        hidden_need: {type: string, nullable: true}
        core_wound: {type: string, nullable: true}
        dominant_fear: {type: string, nullable: true}
        mask_strategy: {type: string, nullable: true}
        pressure_response: {type: string, nullable: true}
        speech_pattern: {type: object, nullable: true}
        movement_pattern: {type: object, nullable: true}
        gaze_pattern: {type: object, nullable: true}
        acting_preset_seed: {type: object, nullable: true}
        status_default: {type: number}
        dominance_baseline: {type: number}
        trust_baseline: {type: number}
        openness_baseline: {type: number}
        volatility_baseline: {type: number}
        tags:
          type: array
          items: {type: string}
          nullable: true
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}

    CharacterStateRead:
      type: object
      properties:
        id: {type: string, format: uuid}
        character_id: {type: string, format: uuid}
        scene_id: {type: string, nullable: true}
        emotional_valence: {type: number}
        arousal: {type: number}
        control_level: {type: number}
        dominance_level: {type: number}
        vulnerability_level: {type: number}
        trust_level: {type: number}
        shame_level: {type: number}
        anger_level: {type: number}
        fear_level: {type: number}
        desire_level: {type: number}
        openness_level: {type: number}
        mask_strength: {type: number}
        internal_conflict_level: {type: number}
        goal_pressure_level: {type: number}
        current_subtext: {type: string, nullable: true}
        current_secret_load: {type: string, nullable: true}
        current_power_position: {type: string}
        update_reason: {type: string, nullable: true}
        created_at: {type: string, format: date-time}

    CharacterWithStateRead:
      allOf:
        - $ref: "#/components/schemas/CharacterRead"
        - type: object
          properties:
            latest_state:
              $ref: "#/components/schemas/CharacterStateRead"

    RelationshipCreate:
      type: object
      required: [project_id, source_character_id, target_character_id, relation_type]
      properties:
        project_id: {type: string}
        source_character_id: {type: string, format: uuid}
        target_character_id: {type: string, format: uuid}
        relation_type: {type: string}
        intimacy_level: {type: number}
        trust_level: {type: number}
        dependence_level: {type: number}
        fear_level: {type: number}
        resentment_level: {type: number}
        attraction_level: {type: number}
        rivalry_level: {type: number}
        dominance_source_over_target: {type: number}
        perceived_loyalty: {type: number}
        hidden_agenda_score: {type: number}
        recent_betrayal_score: {type: number}
        unresolved_tension_score: {type: number}
        status: {type: string}
        last_interaction_scene_id: {type: string, nullable: true}

    RelationshipUpdate:
      type: object
      properties:
        relation_type: {type: string}
        intimacy_level: {type: number}
        trust_level: {type: number}
        dependence_level: {type: number}
        fear_level: {type: number}
        resentment_level: {type: number}
        attraction_level: {type: number}
        rivalry_level: {type: number}
        dominance_source_over_target: {type: number}
        perceived_loyalty: {type: number}
        hidden_agenda_score: {type: number}
        recent_betrayal_score: {type: number}
        unresolved_tension_score: {type: number}
        status: {type: string}
        last_interaction_scene_id: {type: string, nullable: true}

    RelationshipRead:
      type: object
      properties:
        id: {type: string, format: uuid}
        project_id: {type: string}
        source_character_id: {type: string, format: uuid}
        target_character_id: {type: string, format: uuid}
        relation_type: {type: string}
        intimacy_level: {type: number}
        trust_level: {type: number}
        dependence_level: {type: number}
        fear_level: {type: number}
        resentment_level: {type: number}
        attraction_level: {type: number}
        rivalry_level: {type: number}
        dominance_source_over_target: {type: number}
        perceived_loyalty: {type: number}
        hidden_agenda_score: {type: number}
        recent_betrayal_score: {type: number}
        unresolved_tension_score: {type: number}
        status: {type: string}
        last_interaction_scene_id: {type: string, nullable: true}
        updated_at: {type: string, format: date-time}

    RelationshipGraph:
      type: object
      properties:
        project_id: {type: string}
        nodes:
          type: array
          items:
            type: object
            properties:
              character_id: {type: string, format: uuid}
        edges:
          type: array
          items:
            $ref: "#/components/schemas/RelationshipRead"

    SceneDramaAnalyzeRequest:
      type: object
      required: [project_id, scene_id, character_ids]
      properties:
        project_id: {type: string, format: uuid}
        scene_id: {type: string, format: uuid}
        character_ids:
          type: array
          items: {type: string, format: uuid}
          minItems: 2
        scene_context:
          type: object
          additionalProperties: true
          nullable: true

    AnalyzeSceneRequest:
      allOf:
        - $ref: "#/components/schemas/SceneDramaAnalyzeRequest"

    SceneDramaAnalyzeResponse:
      type: object
      properties:
        project_id: {type: string}
        scene_id: {type: string}
        character_count: {type: integer}
        intents:
          type: array
          items:
            type: object
            additionalProperties: true
        tension:
          type: object
          additionalProperties: true
        subtext_map:
          type: array
          items:
            type: object
            additionalProperties: true
        power_shift:
          type: object
          additionalProperties: true
        dominant_character_id: {type: string, nullable: true}
        status: {type: string}

    CompileSceneRequest:
      type: object
      required: [project_id]
      properties:
        project_id: {type: string, format: uuid}
        episode_id: {type: string, format: uuid, nullable: true}
        scene_context:
          type: object
          additionalProperties: true
        scene_analysis:
          type: object
          additionalProperties: true
        previous_scene_state:
          type: object
          additionalProperties: true
          nullable: true
        character_arc_state:
          type: object
          additionalProperties: true
          nullable: true

    CompileSceneDirectRequest:
      type: object
      required: [scene_context, scene_analysis]
      properties:
        scene_context:
          type: object
          additionalProperties: true
        scene_analysis:
          type: object
          additionalProperties: true
        previous_scene_state:
          type: object
          additionalProperties: true
          nullable: true
        character_arc_state:
          type: object
          additionalProperties: true
          nullable: true

    ApplySceneOutcomeRequest:
      type: object
      required: [project_id, scene_id, outcome_type]
      properties:
        project_id: {type: string, format: uuid}
        episode_id: {type: string, format: uuid, nullable: true}
        scene_id: {type: string, format: uuid}
        outcome_type: {type: string}
        turning_point: {type: string, nullable: true}
        trust_shift_delta: {type: number}
        exposure_shift_delta: {type: number}
        dependency_shift_delta: {type: number}
        recompute_downstream: {type: boolean, default: true}

    DialogueSubtextRead:
      type: object
      properties:
        id: {type: string, format: uuid}
        project_id: {type: string, format: uuid, nullable: true}
        episode_id: {type: string, format: uuid, nullable: true}
        scene_id: {type: string, format: uuid}
        line_index: {type: integer}
        speaker_id: {type: string, format: uuid}
