name: alembic-check

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  alembic:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: render_factory
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d render_factory"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/render_factory

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Assert Alembic graph
        run: |
          python - <<'PY'
          from alembic.config import Config
          from alembic.script import ScriptDirectory

          cfg = Config("alembic.ini")
          script = ScriptDirectory.from_config(cfg)
          heads = script.get_heads()
          assert heads == ["20260424_0043"], heads
          revs = {r.revision for r in script.walk_revisions()}
          assert "20260412_0025" in revs, "missing 20260412_0025"
          print("Alembic graph OK")
          PY

      - name: Run Alembic heads
        run: python -m alembic -c alembic.ini heads

      - name: Compile backend
        run: python -m compileall app

      - name: Apply Alembic migrations
        run: python -m alembic -c alembic.ini upgrade head

      - name: Start API server
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          curl --retry 15 --retry-delay 2 --retry-connrefused -f http://localhost:8000/healthz

      - name: Seed audio artifact verify row
        run: |
          python scripts/seed_audio_artifact_verify_row.py \
            --db-url "$DATABASE_URL"

      - name: Verify audio artifact URLs
        # working-directory is backend/, so scripts/ resolves to backend/scripts/
        # Equivalent to: python backend/scripts/verify_audio_artifacts.py from repo root
        run: |
          python scripts/verify_audio_artifacts.py \
            --base-url http://localhost:8000 \
            --db-url "$DATABASE_URL"