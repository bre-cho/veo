name: Unified Runtime Check

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  unified-runtime-check:
    name: Unified Render OS Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      PYTHONPATH: backend
      # Use in-memory / local paths so no real infrastructure is required
      STORAGE_ROOT: /tmp/veo_ci/storage
      RENDER_OUTPUT_DIR: /tmp/veo_ci/render_outputs
      RENDER_CACHE_DIR: /tmp/veo_ci/render_cache
      DATABASE_URL: "postgresql+psycopg://postgres:postgres@localhost:5432/render_factory"
      CELERY_BROKER_URL: "redis://localhost:6379/0"
      APP_ENV: "test"

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: render_factory
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend && npm ci

      # ── Gate 1: Unified runtime verification ────────────────────────
      - name: Verify unified runtime (quick mode, ≤10 s)
        timeout-minutes: 1
        env:
          QUICK_VERIFY_MAX_SECONDS: 10
        run: |
          START=$(date +%s)
          python backend/scripts/verify_unified_runtime.py --mode quick
          END=$(date +%s)
          ELAPSED=$(( END - START ))
          echo "Quick verify completed in ${ELAPSED}s (limit: ${QUICK_VERIFY_MAX_SECONDS}s)"
          if [ "$ELAPSED" -gt "${QUICK_VERIFY_MAX_SECONDS}" ]; then
            echo "::error::verify_unified_runtime.py --mode quick exceeded ${QUICK_VERIFY_MAX_SECONDS}s (took ${ELAPSED}s)"
            exit 1
          fi

      # ── Gate 2: Core render test suite ──────────────────────────────
      - name: Run render test suite
        run: |
          PYTHONPATH=backend pytest \
            backend/tests/test_render_dependency.py \
            backend/tests/test_render_rebuild_policy.py \
            backend/tests/test_execution_budget_guard.py \
            backend/tests/test_budget_policy_presets.py \
            backend/tests/test_budget_aware_response.py \
            -v --tb=short

      # ── Gate 3: Frontend typecheck ───────────────────────────────────
      - name: Frontend type check
        run: cd frontend && npm run typecheck

      # ── Gate 4: i18n hardcode guard ──────────────────────────────────
      - name: Check frontend i18n compliance
        run: python scripts/ci/check_frontend_i18n.py
